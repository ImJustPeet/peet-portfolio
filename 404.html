<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404, Peet</title>
<link rel="icon" type="image/png" sizes="96x96" href="/assets/favicon-96.png">
<link rel="icon" type="image/png" sizes="48x48" href="/assets/favicon-48.png">
<link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:#0c0b0a; color:#f3efe9;
    font-family:'Sora',Arial,sans-serif;
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center;
    padding:24px;
  }
  h1{font-size:clamp(48px,10vw,96px); font-weight:800; color:#ff7a2f; margin-bottom:8px;}
  p{color:#9b948c; font-size:18px; margin-bottom:32px; max-width:40ch;}
  a{
    display:inline-block; padding:14px 28px;
    background:#ff7a2f; color:#160c05; font-weight:700;
    text-decoration:none; border-radius:6px;
    font-family:'JetBrains Mono',monospace; font-size:14px;
  }
  a:hover{opacity:0.9;}
</style>
</head>
<body>
  <h1>404</h1>
  <p id="msg404">🎬 404 — táto časť sa nezmestila do finálneho strihu.</p>
  <a href="/">← Späť domov</a>
<script>
  var messages404 = [
    "🏠 Oni volajú ma na-",
    "⏱️ UŽ BYLO 10 HODIN? Neblázni, choď -",
    "🙋‍♂️ Raz, dva, tri. Ja som vždy okay ako bastardi. Ale táto stránka nie, choď radšej -",
    "🎬 404 — táto časť sa nezmestila do finálneho strihu.",
    "🎬 Render tejto stránky zlyhal. Skús to znova neskôr.",
    "🗑️ Táto stránka skončila v koši, presne ako tých 50 pokusov pred ňou.",
    "📱 New phone, who dis?",
    "🤸🦘🏃🤸‍♀️ Ospravedlňujeme sa, no tejto stránke je hodně."
  ];
  var pool = messages404.filter(function(m){ return m.trim() !== ''; });
  document.getElementById('msg404').textContent = pool[Math.floor(Math.random() * pool.length)];
</script>
</body>
</html>
