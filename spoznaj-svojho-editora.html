<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spoznaj svojho editora, Peet</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" sizes="96x96" href="/assets/favicon-96.png">
  <link rel="icon" type="image/png" sizes="48x48" href="/assets/favicon-48.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="shared.css">
</head>
<body>

<div class="pixel-summer-stage">
  <img src="/assets/pixel-summer/scene.png" alt="" class="ps-scene">
  <img src="/assets/pixel-summer/cloud1.png" alt="" class="ps-cloud1">
  <img src="/assets/pixel-summer/cloud2.png" alt="" class="ps-cloud2">
  <img src="/assets/pixel-summer/palm.png" alt="" class="ps-palm">
  <img src="/assets/pixel-summer/palm-right.png" alt="" class="ps-palm-right">
  <div class="ps-sparkles" id="psSparkles"></div>
</div>

<style>
.pixel-summer-stage{ position:relative; width:100%; aspect-ratio:1440/340; height:auto; overflow:hidden; image-rendering:pixelated; }
.pixel-summer-stage img{ position:absolute; image-rendering:pixelated; }
.ps-scene{ top:0; left:0; width:100%; height:100%; object-fit:cover; object-position:center; }
.ps-cloud1{ width:200px; top:4%; left:8%; animation: psDrift1 42s linear infinite; opacity:0.9; }
.ps-cloud2{ width:150px; top:2%; left:50%; animation: psDrift2 58s linear infinite; opacity:0.8; }
@keyframes psDrift1{ from{transform:translateX(-180px);} to{transform:translateX(900px);} }
@keyframes psDrift2{ from{transform:translateX(-160px);} to{transform:translateX(950px);} }
.ps-palm{ width:200px; bottom:6%; left:1%; transform-origin:50% 95%; animation: psSway 5s ease-in-out infinite; }
@keyframes psSway{ 0%,100%{transform:rotate(-1.2deg);} 50%{transform:rotate(1.4deg);} }
.ps-palm-right{ width:200px; bottom:6%; right:1%; transform-origin:50% 95%; animation: psSwayRight 5.5s ease-in-out infinite; animation-delay:-1.2s; }
@keyframes psSwayRight{ 0%,100%{transform:rotate(1.2deg);} 50%{transform:rotate(-1.4deg);} }
.ps-sparkle{ position:absolute; background:#fff; border-radius:50%; width:3px; height:3px; box-shadow:0 0 4px 1px rgba(255,255,255,0.8); animation: psTwinkle 2.4s ease-in-out infinite; }
@keyframes psTwinkle{ 0%,100%{opacity:0;} 50%{opacity:0.9;} }
@media (prefers-reduced-motion: reduce){ .ps-cloud1,.ps-cloud2,.ps-palm,.ps-palm-right,.ps-sparkle{ animation:none !important; } }
</style>

<header>
  <div class="wrap nav">
    <a class="logo" href="index.html" style="display:flex; align-items:center; gap:9px;">
      <span class="logo-avatar-wrap">
        <img class="logo-avatar" width="28" height="28" decoding="async" loading="lazy" referrerpolicy="no-referrer" alt="" src="https://yt3.googleusercontent.com/IRe7M6VjSCVH0dbUrsJGeDmC05sErJyWMw0k5yBMvI09WLcFtU4TAxEX2bKYYh9rlmsGD5xB4w=s160-c-k-c0x000c0b0a-no-rj" onerror="this.parentElement.classList.add('is-fallback')">
        <span class="logo-avatar-fallback">P</span>
      </span>
      Peet<span style="color:var(--accent);margin-left:-8px">.</span>
    </a>
    <nav class="nav-links">
      <a href="index.html">Domov</a>
      <a href="blog.html">Blog</a>
      <a href="spoznaj-svojho-editora.html" class="is-active">Spoznaj ma</a>
      <a href="index.html#contact">Kontakt</a>
    </nav>
    <button class="hamburger" id="hamburgerBtn" aria-label="Otvoriť menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
  <nav class="mobile-menu" id="mobileMenu">
    <div class="mobile-menu-inner">
      <a href="index.html">Domov</a>
      <a href="blog.html">Blog</a>
      <a href="spoznaj-svojho-editora.html" class="is-active">Spoznaj ma</a>
      <a href="index.html#contact">Kontakt</a>
    </div>
  </nav>
</header>

<main class="wrap" style="padding:80px 0;">
  <div class="eyebrow">Spoznaj svojho editora</div>
  <h1>Viac o mne, nie len o strihu.</h1>
  <p style="color:var(--text-dim);">Knihy, hry, fitness a všetko, čo robím, keď nie som v Premiere Pro.</p>
</main>

<footer>
  <div class="wrap">
    <span>© 2026 Peet</span>
    <span class="mono">Made with care</span>
  </div>
</footer>

<script src="shared.js"></script>
<script>
(function(){
  var stage = document.querySelector('.pixel-summer-stage');
  var container = document.getElementById('psSparkles');
  if (!stage || !container) return;
  var positions = [[30,40],[44,42],[60,38],[70,45],[52,48],[80,40]];
  positions.forEach(function(pos, i){
    var s = document.createElement('div');
    s.className = 'ps-sparkle';
    s.style.left = pos[0] + '%';
    s.style.top = pos[1] + '%';
    s.style.animationDelay = (i*0.4) + 's';
    container.appendChild(s);
  });
})();
</script>
</body>
</html>
