name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Minify HTML
        run: |
          npx html-minifier-terser --collapse-whitespace --remove-comments --minify-css true --minify-js true --output index.html index.html
          npx html-minifier-terser --collapse-whitespace --remove-comments --minify-css true --output 404.html 404.html

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=peet-portfolio --branch=main

      - name: Purge Cloudflare cache for donovanpeet.com
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' | tee purge_result.json
          if grep -q '"success":true' purge_result.json; then
            echo "Cache purged successfully for donovanpeet.com"
          else
            echo "Cache purge failed:" && cat purge_result.json && exit 1
          fi
